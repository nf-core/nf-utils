plugins {
    id 'io.nextflow.nextflow-plugin' version '0.0.1-alpha'
}

// plugin version
version = '1.0.0'

nextflowPlugin {
    // minimum nextflow version
    nextflowVersion = '23.10.0'

    provider = 'nf-core'
    className = 'nfcore.utils.UtilsPlugin'
    extensionPoints = [
        'nfcore.utils.functions.References',
        'nfcore.utils.functions.NfCorePipeline',
        'nfcore.utils.functions.NfValidation',
        'nfcore.utils.functions.NextflowPipeline',
        'nfcore.utils.functions.NfSchema',
        'nfcore.utils.config.UtilsPluginConfig'
    ]

    publishing {
        github {
            repository = 'nf-core/nf-utils'
            userName = project.findProperty('github_username')
            authToken = project.findProperty('github_access_token')
            email = project.findProperty('github_commit_email')

            indexUrl = 'https://github.com/nextflow-io/plugins/blob/main/plugins.json'
        }
    }
}

dependencies {
    // Add any additional dependencies here
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.8.1'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.8.1'
}

test {
    useJUnitPlatform()
}
